<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Clicker</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #87ceeb, #f0f8ff);
            color: #333;
        }
        #splashScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #87ceeb;
            position: absolute;
            width: 100%;
        }
        #home {
            display: none;
            text-align: center;
        }
        #player {
            cursor: pointer;
            width: 150px;
            margin-top: 20px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-15px);
            }
            60% {
                transform: translateY(-10px);
            }
        }
        #coinCounter {
            font-size: 24px;
            margin: 20px;
        }
        #upgradeButton {
            padding: 10px 20px;
            font-size: 18px;
            background-color: orange;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            padding: 10px 0;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #ccc;
        }
        .footer-button {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
        }
        .footer-button:hover {
            background-color: #eef;
        }
    </style>
</head>
<body>

<div id="splashScreen">
    <img src="https://example.com/soccer-ball.png" alt="Pelota de fútbol" id="splashBall">
    <h1>Cargando...</h1>
</div>

<div id="home">
    <h1>Bienvenido a Fútbol Clicker</h1>
    <img src="https://example.com/soccer-player.png" alt="Jugador" id="player">
    <div id="coinCounter">Monedas: <span id="coins">0</span></div>
    <button id="upgradeButton">Mejorar Potencia ($1)</button>
    <div id="footer">
        <div class="footer-button" onclick="showSection('home')">HOME</div>
        <div class="footer-button" onclick="showSection('tasks')">TAREAS</div>
        <div class="footer-button" onclick="showSection('wallet')">BILLETERA</div>
    </div>
</div>

<script>
    let coins = 0;

    // Splash Screen
    setTimeout(() => {
        document.getElementById('splashScreen').style.display = 'none';
        document.getElementById('home').style.display = 'block';
    }, 2000); // 2 segundos de splash

    document.getElementById('player').addEventListener('click', () => {
        coins += 0.1;
        document.getElementById('coins').innerText = coins.toFixed(1);
        alert('¡Monedas recolectadas!');
    });

    function showSection(section) {
        alert(`Navegando a la sección: ${section}`);
        // La lógica para mostrar las diferentes secciones se puede agregar aquí
    }
</script>

</body>
</html>
